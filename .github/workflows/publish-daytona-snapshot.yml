name: publish-daytona-snapshot

# On every push to main: build the harness image, push it to GHCR with the
# commit SHA as its tag, then point the Daytona snapshot named
# `harness-latest` at the new image. Consumers always reference the snapshot
# by its constant name (`harness-latest`) -- they never have to update SHAs.
#
# Daytona forbids `:latest`/`:lts`/`:stable` as IMAGE tags (they're moving
# targets), but snapshot NAMES are user-controlled identifiers. So we tag
# the image with an immutable `:sha-<short>` and reuse the snapshot name.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  SNAPSHOT_NAME: harness-latest

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Compute image reference
        id: meta
        run: |
          repo_lower="${GITHUB_REPOSITORY,,}"
          short_sha="$(git rev-parse --short=12 HEAD)"
          image="${REGISTRY}/${repo_lower}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
          echo "ref=${image}:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          # Daytona expects amd64. Building only one platform keeps the
          # workflow fast; cross-arch builds aren't useful here.
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Daytona snapshot
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          DAYTONA_API_URL: ${{ secrets.DAYTONA_API_URL || 'https://app.daytona.io/api' }}
          IMAGE_REF: ${{ steps.meta.outputs.ref }}
        run: |
          set -euo pipefail

          if [[ -z "${DAYTONA_API_KEY:-}" ]]; then
            echo "DAYTONA_API_KEY secret is not set; skipping snapshot publish."
            exit 1
          fi

          # Up-front: confirm the key actually carries snapshot perms. The
          # /api-keys/current endpoint exposes the configured scopes; bailing
          # here gives a much clearer failure than an opaque 403 from
          # POST /snapshots later.
          perms_status=$(curl -sS -o /tmp/perms -w "%{http_code}" \
            "${DAYTONA_API_URL%/}/api-keys/current" \
            -H "Authorization: Bearer ${DAYTONA_API_KEY}")
          if [[ "$perms_status" != "200" ]]; then
            echo "Could not introspect API key (status $perms_status):"
            cat /tmp/perms
            exit 1
          fi
          if ! jq -e '.permissions | contains(["write:snapshots","delete:snapshots"])' /tmp/perms >/dev/null; then
            echo "DAYTONA_API_KEY is missing the snapshot permissions required to publish."
            echo "Needed: write:snapshots + delete:snapshots."
            echo "Got: $(jq -c .permissions /tmp/perms)"
            echo "Edit the key at https://app.daytona.io/dashboard/keys to add them."
            exit 1
          fi

          api() {
            local method="$1" path="$2" data="${3:-}"
            local url="${DAYTONA_API_URL%/}${path}"
            if [[ -n "$data" ]]; then
              curl -sS -o /tmp/resp -w "%{http_code}" \
                -X "$method" "$url" \
                -H "Authorization: Bearer ${DAYTONA_API_KEY}" \
                -H "Content-Type: application/json" \
                --data "$data"
            else
              curl -sS -o /tmp/resp -w "%{http_code}" \
                -X "$method" "$url" \
                -H "Authorization: Bearer ${DAYTONA_API_KEY}"
            fi
          }

          # 1. Look up the existing snapshot ID by name (DELETE only accepts
          #    UUIDs; GET-by-name is the only way to resolve them).
          echo "Looking up existing snapshot named ${SNAPSHOT_NAME}..."
          lookup=$(api GET "/snapshots/${SNAPSHOT_NAME}")
          case "$lookup" in
            200)
              old_id=$(jq -r .id /tmp/resp)
              echo "found existing snapshot id=${old_id}"
              echo "Deleting ${old_id}..."
              del=$(api DELETE "/snapshots/${old_id}")
              case "$del" in
                200|202|204) echo "delete -> $del (ok)";;
                *) echo "delete -> $del"; cat /tmp/resp; exit 1;;
              esac
              # 2. DELETE returns immediately but the snapshot transitions
              #    through `removing` for ~10s before the name is reusable.
              #    Poll until GET-by-name returns 404.
              echo "Waiting for snapshot to be fully removed..."
              for i in $(seq 1 60); do
                st=$(api GET "/snapshots/${SNAPSHOT_NAME}")
                if [[ "$st" == "404" ]]; then
                  echo "removed after ${i} poll(s)"
                  break
                fi
                if [[ $i -eq 60 ]]; then
                  echo "Timed out waiting for ${SNAPSHOT_NAME} to be removed."
                  cat /tmp/resp
                  exit 1
                fi
                sleep 2
              done
              ;;
            404)
              echo "no existing snapshot named ${SNAPSHOT_NAME} (first run?)"
              ;;
            *)
              echo "lookup -> $lookup"
              cat /tmp/resp
              exit 1
              ;;
          esac

          # 3. POST the new snapshot. It comes back in `pending`, transitions
          #    through `pulling`, and lands on `active` (typically <30s for an
          #    image already in Daytona's registry).
          echo "Creating snapshot ${SNAPSHOT_NAME} -> ${IMAGE_REF}..."
          body=$(jq -nc \
            --arg name "$SNAPSHOT_NAME" \
            --arg image "$IMAGE_REF" \
            '{name: $name, imageName: $image, cpu: 1, memory: 1, disk: 3}')
          status=$(api POST "/snapshots" "$body")
          case "$status" in
            200|201|202)
              new_id=$(jq -r .id /tmp/resp)
              echo "create -> $status (id=${new_id})"
              ;;
            *)
              echo "create -> $status"
              cat /tmp/resp
              exit 1
              ;;
          esac

          # 4. Wait until the new snapshot is `active`. Bail loudly on
          #    `error`/`build_failed` so CI surfaces the issue.
          echo "Waiting for snapshot to become active..."
          for i in $(seq 1 60); do
            api GET "/snapshots/${new_id}" >/dev/null
            state=$(jq -r .state /tmp/resp)
            case "$state" in
              active)
                echo "snapshot ${SNAPSHOT_NAME} is active after ${i} poll(s)"
                break
                ;;
              error|build_failed)
                echo "snapshot entered terminal failure state: ${state}"
                jq . /tmp/resp
                exit 1
                ;;
              pending|pulling|building) ;;
              *) echo "unexpected state: ${state}"; jq . /tmp/resp; exit 1;;
            esac
            if [[ $i -eq 60 ]]; then
              echo "Timed out waiting for ${SNAPSHOT_NAME} to become active."
              jq . /tmp/resp
              exit 1
            fi
            sleep 2
          done

          echo
          echo "Snapshot ${SNAPSHOT_NAME} (id=${new_id}) now points at ${IMAGE_REF}."
